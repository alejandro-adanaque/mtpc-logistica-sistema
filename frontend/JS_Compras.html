<script>
/**
 * MÓDULO: GESTIÓN DE COMPRAS (V2)
 * Lógica Completa: Carrito, Análisis y PDF
 */

var listaProductosGlobal = [];
var carritoCompras = [];
var proveedoresCache = [];
var cuentasCache = [];
var listaComprasCache = [];
var chartInstance = null; 
var currentPageComp = 1;
var itemsPerPageComp = 10;
var currentPageCatalog = 1;
var itemsPerPageCatalog = 10;
var listaFiltradaGlobal = []; 

// ==========================================
// 1. RENDERIZADO
// ==========================================
function renderCompras() {
    var container = document.getElementById('app-container');
    if (!container) return;

    // Loader Corporativo (Igual a Productos)
    container.innerHTML = `
        <div class="loader-container animate__animated animate__fadeIn">
            <div class="stitch-spinner"></div>
            <h5 class="fw-bold mt-3 text-primary">Cargando Compras</h5>
            <p class="small text-muted">Sincronizando historial y proveedores...</p>
        </div>`;
    
    google.script.run.withSuccessHandler(html => {
        container.innerHTML = html;
        cargarDatosCompras(); // Carga inicial de datos
    }).obtenerVista('View_Compras');
}
// ==========================================
// 2. LÓGICA DE DATOS
// ==========================================
function cargarDatosCompras() {
    // Si la tabla ya existe (recarga parcial), poner loader solo ahí
    var tbody = document.getElementById('tabla-compras-body');
    if(tbody) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5"><div class="stitch-spinner mx-auto"></div></td></tr>';
    }

    // Llamada al backend (INTACTA)
    google.script.run.withSuccessHandler(res => {
        if(!res.exito) return StitchFeedback.error(res.error);
        listaComprasCache = res.datos || []; 
        poblarFiltrosHeader(listaComprasCache);
        renderizarMetricas(listaComprasCache);
        // Si no es recarga parcial (primera vez), forzamos página 1
        // Si es recarga, mantenemos la página actual si es posible
        aplicarFiltrosCompras(false); 
    }).dbSelect('compras', '*, proveedores(razon_social), cuentas_pago(nombre)', '&order=id.desc'); 
}

function poblarFiltrosHeader(datos) {
    var provs = [...new Set(datos.map(d => d.proveedores?.razon_social).filter(Boolean))].sort();
    var selProv = document.getElementById('filtro-prov');
    if(!selProv) return;
    let htmlProv = '<option value="">Todos los Proveedores</option>';
    provs.forEach(p => htmlProv += `<option value="${p}">${p}</option>`);
    selProv.innerHTML = htmlProv;
}

function renderizarMetricas(datos) {
    // --- 1. LÓGICA DE CÁLCULO (CORREGIDA) ---
    var hoy = new Date(); 
    var mesActual = hoy.getMonth(); 
    var anioActual = hoy.getFullYear();
    
    // Filtro por mes actual (todas las órdenes del mes)
    var comprasMes = datos.filter(c => { 
        var d = new Date(c.fecha_emision + 'T00:00:00'); 
        return d.getMonth() === mesActual && d.getFullYear() === anioActual; 
    });
    
    // CORRECCIÓN: Solo sumamos el total si el estado es 'Confirmado'
    var totalInversion = comprasMes
        .filter(c => c.estado === 'Confirmado') // <-- Filtro clave de seguridad
        .reduce((sum, c) => sum + parseFloat(c.total || 0), 0);
    
    // Conteo de órdenes pendientes (Borradores)
    var pendientes = datos.filter(c => c.estado !== 'Confirmado').length;
    
    var container = document.getElementById('metrics-compras');
    if (!container) return;

    // --- 2. RENDERIZADO ---
    var html = '';

    // KPI 1: Órdenes del Mes (Muestra el conteo total de transacciones iniciadas)
    html += `
        <div class="col-md-4">
            <div class="card-kpi kpi-blue">
                <div class="kpi-icon-wrapper"><i class="fa-solid fa-file-invoice"></i></div>
                <div>
                    <div class="kpi-title">Órdenes (Mes)</div>
                    <div class="kpi-value">${comprasMes.length}</div>
                    <div class="kpi-subtitle">Total generadas</div>
                </div>
            </div>
        </div>`;

    // KPI 2: Inversión Real (Solo Confirmados)
    html += `
        <div class="col-md-4">
            <div class="card-kpi kpi-green">
                <div class="kpi-icon-wrapper"><i class="fa-solid fa-sack-dollar"></i></div>
                <div>
                    <div class="kpi-title">Inversión (Mes)</div>
                    <div class="kpi-value">S/ ${totalInversion.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
                    <div class="kpi-subtitle">Solo órdenes confirmadas</div>
                </div>
            </div>
        </div>`;

    // KPI 3: Por Ingresar (Borradores)
    html += `
        <div class="col-md-4">
            <div class="card-kpi kpi-yellow">
                <div class="kpi-icon-wrapper"><i class="fa-regular fa-clock"></i></div>
                <div>
                    <div class="kpi-title">Por Ingresar</div>
                    <div class="kpi-value">${pendientes}</div>
                    <div class="kpi-subtitle">Borradores pendientes</div>
                </div>
            </div>
        </div>`;

    container.innerHTML = html;
}

function aplicarFiltrosCompras(resetPagina = false) {
    if(resetPagina) currentPageComp = 1;
    var texto = document.getElementById('buscador-compras').value.toLowerCase();
    var prov = document.getElementById('filtro-prov').value;
    
    var filtrados = listaComprasCache.filter(c => {
        var matchText = c.codigo_orden.toLowerCase().includes(texto) || (c.proveedores?.razon_social || '').toLowerCase().includes(texto);
        var matchProv = prov ? (c.proveedores?.razon_social === prov) : true;
        return matchText && matchProv;
    });
    
    renderizarTablaPaginada(filtrados);
}

function renderizarTablaPaginada(datos) {
    var tbody = document.getElementById('tabla-compras-body');
    if(!tbody) return;

    var totalItems = datos.length;
    var totalPages = Math.ceil(totalItems / itemsPerPageComp);
    var start = (currentPageComp - 1) * itemsPerPageComp;
    var datosPagina = datos.slice(start, start + itemsPerPageComp);
    
    if(totalItems === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted fst-italic">Sin registros de compras.</td></tr>';
        document.getElementById('paginacion-container-comp').innerHTML = '';
        return;
    }

    let html = '';
    const sesion = JSON.parse(localStorage.getItem('MTPC_Sesion') || '{}');
    const esAdmin = sesion.rol === 'Administrador';

    datosPagina.forEach(c => {
        // Estilo de Pills de Estado (Igual a salud de stock)
        let pillClass = c.estado === 'Confirmado' ? 'pill-health-good' : 'pill-health-warning';
        let iconState = c.estado === 'Confirmado' ? '<i class="fa-solid fa-circle-check"></i>' : '<i class="fa-solid fa-clock"></i>';
        
        // Icono representativo del tipo de documento
        let iconDoc = '<i class="fa-solid fa-file-invoice text-secondary"></i>';

        html += `
            <tr class="align-middle border-bottom animate__animated animate__fadeIn">
                <td class="ps-4 py-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-3 bg-light border d-flex align-items-center justify-content-center" style="width:42px; height:42px;">
                            ${iconDoc}
                        </div>
                        <div>
                            <div class="fw-bold text-primary" style="font-size:0.9rem;">${c.codigo_orden}</div>
                            <div class="small text-muted text-uppercase" style="font-size:0.65rem;">${c.tipo || 'Factura'}</div>
                        </div>
                    </div>
                </td>
                
                <td class="text-muted small">${c.fecha_emision}</td>
                
                <td><div class="fw-bold text-dark text-truncate font-head" style="max-width: 180px;">${c.proveedores?.razon_social || '-'}</div></td>
                
                <td><span class="text-muted small">${c.cuentas_pago?.nombre || '-'}</span></td>
                
                <td class="text-center">
                    <div class="stock-pill ${pillClass}" style="font-size:0.7rem; min-width: 95px;">
                        ${iconState} ${c.estado}
                    </div>
                </td>
                
                <td class="text-end fw-bold text-dark">S/ ${parseFloat(c.total).toFixed(2)}</td>
                
                <td class="pe-4 text-end">
                    <div class="d-flex justify-content-end gap-1">
                        <button class="btn-std btn-icon-only btn-std-outline shadow-sm" onclick="imprimirOrden(${c.id})" title="Ver PDF">
                            <i class="fa-solid fa-file-pdf"></i>
                        </button>
                        
                        ${c.estado !== 'Confirmado' ? `
                            <button class="btn-std btn-icon-only btn-std-outline text-success shadow-sm" onclick="confirmarOrden(${c.id}, '${c.codigo_orden}')" title="Ingresar Stock">
                                <i class="fa-solid fa-check"></i>
                            </button>` : ''}
                        
                        ${esAdmin ? `
                            <button class="btn-std btn-icon-only btn-std-outline text-danger shadow-sm" onclick="eliminarOrden(${c.id}, '${c.codigo_orden}', '${c.estado}')" title="Eliminar">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>` : ''}
                    </div>
                </td>
            </tr>`;
    });
    tbody.innerHTML = html;
    
    // Paginación Estándar (Consistente con todo el sistema)
    document.getElementById('info-paginacion-comp').innerHTML = `Mostrando <b>${start + 1}-${Math.min(start + itemsPerPageComp, totalItems)}</b> de <b>${totalItems}</b>`;
    
    let pagHtml = `<button class="page-btn ${currentPageComp===1?'disabled':''}" onclick="cambiarPaginaComp(${currentPageComp-1})"><i class="fa-solid fa-chevron-left"></i></button>`;
    
    for(let i=1; i<=totalPages; i++) {
        if(i === 1 || i === totalPages || (i >= currentPageComp - 1 && i <= currentPageComp + 1)) {
             pagHtml += `<button class="page-btn ${currentPageComp===i?'active':''}" onclick="cambiarPaginaComp(${i})">${i}</button>`;
        }
    }
    
    pagHtml += `<button class="page-btn ${currentPageComp===totalPages?'disabled':''}" onclick="cambiarPaginaComp(${currentPageComp+1})"><i class="fa-solid fa-chevron-right"></i></button>`;
    document.getElementById('paginacion-container-comp').innerHTML = pagHtml;
}

function cambiarPaginaComp(p) { 
    if(p>0) { currentPageComp = p; aplicarFiltrosCompras(false); } 
}

// ==========================================
// 3. NUEVA ORDEN (LÓGICA CARRITO)
// ==========================================
function abrirOffcanvasCompra() {
    var bsOffcanvas = new bootstrap.Offcanvas(document.getElementById('offcanvasCompra'));
    bsOffcanvas.show(); 
    
    var p1 = new Promise(r => google.script.run.withSuccessHandler(res => r(res)).dbSelect('productos', 'id, nombre, sku, precio_costo_promedio, stock_actual', '&activo=eq.true'));
    var p2 = new Promise(r => google.script.run.withSuccessHandler(res => r(res)).dbSelect('proveedores', 'id, razon_social'));
    var p3 = new Promise(r => google.script.run.withSuccessHandler(res => r(res)).dbSelect('cuentas_pago', 'id, nombre'));

    Promise.all([p1, p2, p3]).then(res => {
        listaProductosGlobal = res[0].datos || [];
        listaFiltradaGlobal = [...listaProductosGlobal];
        proveedoresCache = res[1].datos || [];
        cuentasCache = res[2].datos || [];

        currentPageCatalog = 1;
        renderizarCatalogo(listaFiltradaGlobal);
        llenarSelectsCompra();
        carritoCompras = [];
        document.getElementById('cart-fecha').value = new Date().toISOString().split('T')[0];
        recalcularTotalCarrito();
    });
}

function renderizarCatalogo(listaCompleta) {
    // --- LÓGICA DE DATOS (INTACTA) ---
    var totalItems = listaCompleta.length;
    var totalPages = Math.ceil(totalItems / itemsPerPageCatalog) || 1;
    if(currentPageCatalog > totalPages) currentPageCatalog = totalPages;
    if(currentPageCatalog < 1) currentPageCatalog = 1;
    
    var start = (currentPageCatalog - 1) * itemsPerPageCatalog;
    var datosPagina = listaCompleta.slice(start, start + itemsPerPageCatalog);
    var grid = document.getElementById('grid-catalogo');
    
    let html = '';

    // --- ÍTEM LIBRE (Estilo Dashed Amarillo) ---
    if(currentPageCatalog === 1) {
        html += `
            <div class="card-std p-3 mb-3 border-warning bg-opacity-10 cursor-pointer hover-shadow" onclick="agregarItemLibre()" style="border: 2px dashed #fbbf24; background-color: #fffbeb;">
                <div class="d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-warning text-white d-flex align-items-center justify-content-center shadow-sm" style="width:40px; height:40px;">
                            <i class="fa-solid fa-pen-nib"></i>
                        </div>
                        <div>
                            <h6 class="fw-bold m-0 font-head text-dark small">Ítem Libre / Gastos</h6>
                            <small class="text-muted x-small">Concepto manual</small>
                        </div>
                    </div>
                    <div class="btn-std btn-icon-only rounded-circle bg-warning text-white shadow-sm border-0">
                        <i class="fa-solid fa-plus"></i>
                    </div>
                </div>
            </div>
            <div class="h-px bg-border-color my-3 opacity-50"></div>`; // Separador sutil
    }

    // --- LISTA DE PRODUCTOS (Estilo Card Stitch) ---
    datosPagina.forEach(p => { 
        html += `
            <div class="card-std p-3 mb-2 hover-bg cursor-pointer transition-all border shadow-sm" onclick="agregarAlCarrito(${p.id})">
                <div class="d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center gap-3 overflow-hidden">
                        <div class="rounded-3 bg-light text-muted d-flex align-items-center justify-content-center border" style="width: 40px; height: 40px; min-width:40px;">
                            <i class="fa-solid fa-box-open"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h6 class="fw-bold m-0 text-dark text-truncate font-head small" title="${p.nombre}">${p.nombre}</h6>
                            <small class="text-muted x-small">${p.sku}</small>
                        </div>
                    </div>
                    <div class="text-end ms-2" style="min-width: 80px;">
                        <div class="fw-bold text-dark small">S/ ${parseFloat(p.precio_costo_promedio).toFixed(2)}</div>
                        <small class="text-primary fw-bold x-small">+ Agregar</small>
                    </div>
                </div>
            </div>`; 
    });
    
    grid.innerHTML = html;
    
    // --- LÓGICA DE PAGINACIÓN (INTACTA - Solo clases CSS) ---
    document.getElementById('info-paginacion-cat').innerText = `${start + 1}-${Math.min(start + itemsPerPageCatalog, totalItems)} de ${totalItems}`;
    
    let pagHtml = `<li class="page-item ${currentPageCatalog===1?'disabled':''}"><button class="page-btn" onclick="cambiarPaginaCatalogo(${currentPageCatalog-1})"><i class="fa-solid fa-chevron-left"></i></button></li>`;
    
    let s = Math.max(1, currentPageCatalog - 1);
    let e = Math.min(totalPages, s + 2);
    if(e - s < 2) s = Math.max(1, e - 2);
    
    for(var i=s; i<=e; i++) {
        if(i < 1) continue;
        var active = i === currentPageCatalog ? 'active' : '';
        // Aquí uso la clase page-btn en lugar de estilos inline raros
        pagHtml += `<li class="page-item"><button class="page-btn ${active}" onclick="cambiarPaginaCatalogo(${i})">${i}</button></li>`;
    }
    
    pagHtml += `<li class="page-item ${currentPageCatalog===totalPages?'disabled':''}"><button class="page-btn" onclick="cambiarPaginaCatalogo(${currentPageCatalog+1})"><i class="fa-solid fa-chevron-right"></i></button></li>`;
    
    document.getElementById('paginacion-catalogo-container').innerHTML = pagHtml;
}

function filtrarCatalogo(texto) { 
    var t = texto.toLowerCase();
    listaFiltradaGlobal = listaProductosGlobal.filter(p => p.nombre.toLowerCase().includes(t) || p.sku.toLowerCase().includes(t)); 
    currentPageCatalog = 1; 
    renderizarCatalogo(listaFiltradaGlobal); 
}

function cambiarPaginaCatalogo(pag) { if(pag>0) { currentPageCatalog = pag; renderizarCatalogo(listaFiltradaGlobal); } }

function llenarSelectsCompra() {
    var selProv = document.getElementById('cart-prov'); 
    var selCta = document.getElementById('cart-cuenta');
    let htmlProv = '<option value="">Seleccione...</option>'; 
    proveedoresCache.forEach(p => htmlProv += `<option value="${p.id}">${p.razon_social}</option>`); 
    selProv.innerHTML = htmlProv;
    
    let htmlCta = ''; 
    cuentasCache.forEach(c => htmlCta += `<option value="${c.id}">${c.nombre}</option>`); 
    selCta.innerHTML = htmlCta;
}

function agregarAlCarrito(idProducto) {
    var prod = listaProductosGlobal.find(p => p.id === idProducto);
    var existe = carritoCompras.find(i => i.producto_id === idProducto);
    if(existe) {
        existe.cantidad++;
        StitchFeedback.success("Cantidad +1");
    } else {
        carritoCompras.push({
            producto_id: prod.id, descripcion: prod.nombre, sku: prod.sku,
            cantidad: 1, precio: parseFloat(prod.precio_costo_promedio) || 0,
            referencia: '', es_libre: false
        });
    }
    renderizarCarrito();
}

function agregarItemLibre() {
    carritoCompras.push({ producto_id: null, descripcion: 'Item Libre', cantidad: 1, precio: 0, referencia: '', es_libre: true });
    renderizarCarrito();
}

function renderizarCarrito() {
    var container = document.getElementById('cart-items-list');
    document.getElementById('badge-items-count').innerText = carritoCompras.length;

    if(carritoCompras.length === 0) {
        container.innerHTML = '<div class="text-center py-5 opacity-50 small font-body border border-dashed rounded-3 bg-white mt-3">El carrito está vacío</div>';
        recalcularTotalCarrito();
        return;
    }

    let html = '';
    carritoCompras.forEach((item, idx) => {
        // CORRECCIÓN: Usamos item.precio (con 'o') y aseguramos número
        let precioNum = parseFloat(item.precio) || 0;
        let subtotalCalculado = (item.cantidad * precioNum).toFixed(2);
        
        let titleBlock = item.es_libre 
            ? `<div class="md3-input-wrapper mb-2">
                <div class="md3-input-group">
                    <i class="fas fa-font text-primary me-2"></i>
                    <input type="text" class="md3-input-field fw-bold" value="${item.descripcion}" 
                           oninput="actualizarDatoMemoria(${idx}, 'descripcion', this.value)">
                </div>
                <label class="md3-label">Descripción del ítem</label>
               </div>`
            : `<h6 class="fw-bold text-dark text-truncate m-0 font-head" style="font-size:0.85rem;">${item.descripcion}</h6>
               <small class="text-muted font-monospace x-small">SKU: ${item.sku}</small>`;

        html += `
            <div class="card-std p-3 bg-white border shadow-sm position-relative animate__animated animate__fadeInRight">
                <button class="btn btn-sm text-danger position-absolute top-0 end-0 mt-1 me-1 opacity-50 hover-opacity-100 p-1" onclick="eliminarDelCarrito(${idx})">
                    <i class="fa-solid fa-xmark fs-6"></i>
                </button>
                <div class="pe-4 mb-3">${titleBlock}</div>
                <div class="d-flex align-items-end justify-content-between gap-2">
                    <div class="d-flex gap-2 align-items-center">
                        <div class="d-flex align-items-center bg-light border rounded-2 overflow-hidden" style="height: 36px;">
                            <button class="btn btn-sm px-2 border-0 hover-bg-gray h-100 text-muted" onclick="cambiarCant(${idx}, -1)"><i class="fa-solid fa-minus x-small"></i></button>
                            <input type="text" class="form-control-plaintext text-center fw-bold p-0 bg-transparent" style="width: 30px; font-size: 0.85rem;" value="${item.cantidad}" readonly>
                            <button class="btn btn-sm px-2 border-0 hover-bg-gray h-100 text-primary" onclick="cambiarCant(${idx}, 1)"><i class="fa-solid fa-plus x-small"></i></button>
                        </div>
                        <div class="d-flex align-items-center border rounded-2 overflow-hidden px-2 bg-white" style="height: 36px; width: 110px;">
                            <i class="fas fa-sack-dollar text-muted x-small me-1"></i>
                            <input type="number" class="form-control border-0 fw-bold p-0 text-end text-dark" style="font-size: 0.85rem;" value="${item.precio}" oninput="actualizarPrecioSilencioso(${idx}, this.value)">
                        </div>
                    </div>
                    <div class="text-end">
                        <small class="text-muted d-block x-small uppercase fw-bold" style="font-size:0.6rem;">Subtotal</small>
                        <span class="fw-bold text-primary font-monospace" id="sub-item-${idx}" style="font-size:1rem;">S/ ${subtotalCalculado}</span>
                    </div>
                </div>
                <input type="text" class="form-control form-control-sm mt-3 border-0 bg-light small" style="font-size:0.7rem;" placeholder="Referencia / Serie..." value="${item.referencia || ''}" oninput="actualizarDatoMemoria(${idx}, 'referencia', this.value)">
            </div>`;
    });
    container.innerHTML = html;
    recalcularTotalCarrito();
}


function actualizarPrecioSilencioso(idx, valor) {
    let num = parseFloat(valor) || 0;
    carritoCompras[idx].precio = num; // CORRECCIÓN: propiedad unificada
    
    let nuevoSub = (carritoCompras[idx].cantidad * num).toFixed(2);
    let label = document.getElementById(`sub-item-${idx}`);
    if(label) label.innerText = `S/ ${nuevoSub}`;
    
    recalcularTotalCarrito();
}

function actualizarDatoMemoria(idx, campo, valor) {
    if(campo === 'descripcion') carritoCompras[idx].descripcion = valor;
    else if(campo === 'referencia') carritoCompras[idx].referencia = valor;
}

function cambiarCant(idx, delta) {
    var nuevo = carritoCompras[idx].cantidad + delta;
    if(nuevo > 0) { carritoCompras[idx].cantidad = nuevo; renderizarCarrito(); }
}

function eliminarDelCarrito(idx) { carritoCompras.splice(idx, 1); renderizarCarrito(); }

function recalcularTotalCarrito() {
    var totalBruto = carritoCompras.reduce((sum, item) => sum + (item.cantidad * item.precio), 0);
    var tipoDoc = document.getElementById('cart-doc').value;
    var subtotal = (tipoDoc === 'Factura') ? totalBruto / 1.18 : totalBruto;
    var igv = totalBruto - subtotal;

    document.getElementById('lbl-subtotal').innerText = subtotal.toFixed(2);
    document.getElementById('lbl-igv').innerText = igv.toFixed(2);
    document.getElementById('lbl-total').innerText = totalBruto.toFixed(2);
}

function guardarOrdenCompra() {
    var sesion = JSON.parse(localStorage.getItem('MTPC_Sesion') || '{}');
    if (!sesion.id) return StitchFeedback.error('Sesión inválida. Reingrese.');
    
    var prov = document.getElementById('cart-prov').value;
    var cta = document.getElementById('cart-cuenta').value;
    if (!prov || !cta) return StitchFeedback.error('Seleccione Proveedor y Cuenta');
    if (carritoCompras.length === 0) return StitchFeedback.error('Carrito vacío');

    var total = parseFloat(document.getElementById('lbl-total').innerText);
    var subtotal = parseFloat(document.getElementById('lbl-subtotal').innerText);
    var igv = parseFloat(document.getElementById('lbl-igv').innerText);

    var cabecera = {
        proveedor_id: parseInt(prov),
        cuenta_pago_id: parseInt(cta),
        fecha_emision: document.getElementById('cart-fecha').value || new Date().toISOString().split('T')[0],
        estado: document.getElementById('cart-estado').value,
        tipo: document.getElementById('cart-doc').value,
        total: total, subtotal: subtotal, igv_monto: igv,
        generado_por: sesion.nombre,
        usuario_id: sesion.id
    };

    var detalles = carritoCompras.map(i => ({
        producto_id: i.producto_id,
        descripcion: i.descripcion,
        cantidad: i.cantidad,
        precio_unitario: i.precio,
        referencia: i.referencia || '',
        total_linea: (i.cantidad * i.precio)
    }));

    MTPC_Toast.loading('Registrando orden...');
    
    google.script.run.withSuccessHandler(res => {
        if (res.exito) {
            MTPC_Toast.success('Orden registrada'); 
            bootstrap.Offcanvas.getInstance(document.getElementById('offcanvasCompra')).hide();
            
            // DIÁLOGO DE ÉXITO ESTILO PREMIUM (Tu mockup)
            Swal.fire({
                title: '¡Orden Generada!',
                html: `<div class="py-2">La orden <b class="text-primary">#${res.codigo}</b> se guardó correctamente.</div><p class="text-muted small">¿Deseas descargar el documento PDF ahora?</p>`,
                icon: 'success',
                iconColor: '#22c55e',
                showCancelButton: true,
                confirmButtonText: '<i class="fa-solid fa-file-pdf me-2"></i> Descargar PDF',
                cancelButtonText: 'Cerrar',
                buttonsStyling: false,
                customClass: {
                    popup: 'mtpc-swal-popup',
                    title: 'mtpc-swal-title',
                    htmlContainer: 'mtpc-swal-html',
                    confirmButton: 'btn btn-success mtpc-swal-confirm mx-2', 
                    cancelButton: 'btn btn-light mtpc-swal-cancel mx-2'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    imprimirOrden(res.id); // Llamada directa con el ID retornado
                }
            });

            cargarDatosCompras(); 
        } else {
            MTPC_Toast.error("Error: " + res.error);
        }
    }).registrarCompraCompleta(cabecera, detalles);
}

function confirmarOrden(id, codigo) {
    Swal.fire({
        title: 'Ingresar Stock', text: `¿Confirmar ingreso de la orden ${codigo}?`, icon: 'question',
        showCancelButton: true, confirmButtonColor: '#198754', confirmButtonText: 'Sí, Ingresar'
    }).then(r => {
        if(r.isConfirmed) {
            MTPC_Toast.loading('Procesando ingreso de stock...');
            google.script.run.withSuccessHandler(res => {
                if(res.exito) { MTPC_Toast.success('Stock actualizado'); cargarDatosCompras(); }
                else MTPC_Toast.error(res.error);
            }).confirmarOrdenExistente(id);
        }
    });
}

function eliminarOrden(id, codigo, estado) {
    // 1. Preparamos el mensaje según el estado
    let msg = estado === 'Confirmado' 
        ? `¿Estás seguro de eliminar la orden <b class="text-dark">${codigo}</b>?<br><small class="text-danger">Se restará el stock ingresado del inventario.</small>` 
        : `¿Deseas eliminar el borrador de la orden <b class="text-dark">${codigo}</b>?`;

    // 2. Lanzamos el Swal con los nuevos estilos
    Swal.fire({
        title: '¿Eliminar Orden?',
        html: msg,
        icon: 'warning',
        iconColor: '#ef4444',
        showCancelButton: true,
        confirmButtonText: 'Sí, Eliminar',
        cancelButtonText: 'Cancelar',
        buttonsStyling: false, // Importante para usar nuestro CSS
        customClass: {
            popup: 'mtpc-swal-popup',
            title: 'mtpc-swal-title',
            confirmButton: 'mtpc-swal-confirm btn btn-danger mx-2',
            cancelButton: 'mtpc-swal-cancel btn btn-light mx-2'
        },
        reverseButtons: true
    }).then(r => {
        if(r.isConfirmed) {
            // Feedback con la cápsula inferior (Tu estándar MTPC_Toast)
            MTPC_Toast.loading('Eliminando orden...');
            
            google.script.run.withSuccessHandler(res => {
                if(res.exito) { 
                    MTPC_Toast.success('Orden eliminada correctamente'); 
                    cargarDatosCompras(); // Refresca la tabla
                } else {
                    MTPC_Toast.error("No se pudo eliminar: " + res.error);
                }
            }).eliminarCompra(id);
        }
    });
}

function abrirOffcanvasAnalisis(preselectId = null) {
    new bootstrap.Offcanvas(document.getElementById('offcanvasAnalisis')).show();
    
    // Poblamos el datalist (Mucho más rápido que un select para 1000+ items)
    const datalist = document.getElementById('lista-productos-analisis');
    datalist.innerHTML = '';
    
    // Usamos los productos ya cargados en memoria o los pedimos
    google.script.run.withSuccessHandler(res => {
        let html = '';
        if(res.datos) {
            res.datos.forEach(p => {
                // El value es el nombre, el data-id es el ID real
                html += `<option data-id="${p.id}" value="${p.nombre} (SKU: ${p.sku})"></option>`;
            });
        }
        datalist.innerHTML = html;

        // Si venimos de un producto específico (ej. desde el carrito)
        if(preselectId) {
            let prod = res.datos.find(p => p.id == preselectId);
            if(prod) {
                document.getElementById('analisis-prod-search').value = `${prod.nombre} (SKU: ${prod.sku})`;
                ejecutarAnalisis(preselectId);
            }
        }
    }).dbSelect('productos', 'id, nombre, sku', '&activo=eq.true&order=nombre.asc');
}

// Función intermedia para obtener el ID desde el datalist
function validarYEjecutarAnalisis(valor) {
    const option = document.querySelector(`#lista-productos-analisis option[value="${valor}"]`);
    if (option) {
        const prodId = option.getAttribute('data-id');
        ejecutarAnalisis(prodId);
    }
}

function ejecutarAnalisis(prodId) {
    if(!prodId) return;
    var content = document.getElementById('analisis-content');
    content.innerHTML = '<div class="text-center py-5"><div class="stitch-spinner mx-auto"></div><p class="mt-2 small text-muted">Consultando historial de costos...</p></div>';

    google.script.run.withSuccessHandler(res => {
        if(!res.exito || !res.datos || res.datos.length === 0) {
            content.innerHTML = '<div class="card-std p-5 text-center text-muted border-dashed"><i class="fa-solid fa-folder-open fa-2x mb-3"></i><p>Este producto no tiene compras registradas.</p></div>';
            return;
        }

        // 1. Procesar Datos
        var historial = res.datos.map(d => ({
            fecha: d.compras.fecha_emision,
            precio: parseFloat(d.precio_unitario),
            prov: d.compras.proveedores ? d.compras.proveedores.razon_social : 'Desconocido',
            orden: d.compras.codigo_orden
        })).sort((a,b) => new Date(a.fecha) - new Date(b.fecha));

        var precios = historial.map(h => h.precio);
        var precioActual = precios[precios.length - 1];
        var precioMinimo = Math.min(...precios);
        var precioPromedio = precios.reduce((a, b) => a + b, 0) / precios.length;

        // 2. Renderizar HTML (KPIs y Tabla)
        // ... (Este bloque es el mismo que el anterior, lo mantengo para que sea funcional al pegar) ...
        let html = `
            <div class="row g-2 mb-4">
              <div class="col-4">
                  <div class="kpi-card-mini kpi-blue-mini shadow-sm">
                      <div class="d-flex align-items-center">
                          <div class="kpi-icon-mini">
                              <i class="fa-solid fa-tag"></i>
                          </div>
                          <div class="ms-2">
                              <div class="kpi-title-mini">Último Costo</div>
                              <div class="kpi-value-mini text-dark">S/ ${precioActual.toFixed(2)}</div>
                          </div>
                      </div>
                      <div class="kpi-footer-mini text-muted">Última transac.</div>
                  </div>
              </div>

              <div class="col-4">
                  <div class="kpi-card-mini kpi-yellow-mini shadow-sm">
                      <div class="d-flex align-items-center">
                          <div class="kpi-icon-mini">
                              <i class="fa-solid fa-calculator"></i>
                          </div>
                          <div class="ms-2">
                              <div class="kpi-title-mini">Promedio</div>
                              <div class="kpi-value-mini text-dark">S/ ${precioPromedio.toFixed(2)}</div>
                          </div>
                      </div>
                      <div class="kpi-footer-mini text-muted">Media histórica</div>
                  </div>
              </div>

              <div class="col-4">
                  <div class="kpi-card-mini kpi-green-mini shadow-sm">
                      <div class="d-flex align-items-center">
                          <div class="kpi-icon-mini">
                              <i class="fa-solid fa-trophy"></i>
                          </div>
                          <div class="ms-2">
                              <div class="kpi-title-mini">Mejor Precio</div>
                              <div class="kpi-value-mini text-success">S/ ${precioMinimo.toFixed(2)}</div>
                          </div>
                      </div>
                      <div class="kpi-footer-mini text-muted">Récord bajo</div>
                  </div>
              </div>
          </div>
            <div class="card-std p-4 mb-4 bg-white border-0 shadow-sm">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h6 class="fw-bold m-0 font-head"><i class="fa-solid fa-chart-area me-2 text-primary"></i>Tendencia de Precios</h6>
                    <span class="badge bg-primary bg-opacity-10 text-primary border-0 px-3">Interactiva</span>
                </div>
                <div style="height: 250px;"><canvas id="chartAnalisis"></canvas></div>
            </div>
            <div class="table-std-wrapper shadow-sm border-0 bg-white">
                <table class="table-std">
                    <thead><tr><th>FECHA</th><th>PROVEEDOR</th><th>ORDEN</th><th class="text-center">VAR.</th><th class="text-end">COSTO UNIT.</th></tr></thead>
                    <tbody>`;

        var historialInvertido = [...historial].reverse();
        historialInvertido.forEach((h, idx) => {
            let diffIcon = '<span class="text-muted small">-</span>';
            if (idx < historialInvertido.length - 1) {
                let ant = historialInvertido[idx + 1].precio;
                if (h.precio > ant) diffIcon = '<i class="fa-solid fa-caret-up text-danger"></i>';
                else if (h.precio < ant) diffIcon = '<i class="fa-solid fa-caret-down text-success"></i>';
            }
            html += `<tr><td class="small fw-bold">${DateUtils.toUserDate(h.fecha)}</td><td><div class="d-flex align-items-center gap-2"><div class="rounded-circle bg-primary bg-opacity-10 text-primary d-flex align-items-center justify-content-center" style="width:24px; height:24px; font-size:10px; font-weight:bold;">${h.prov.charAt(0)}</div><span class="text-truncate font-head fw-bold" style="max-width: 180px;">${h.prov}</span></div></td><td><span class="badge bg-light text-secondary border fw-normal">${h.orden}</span></td><td class="text-center">${diffIcon}</td><td class="text-end fw-bold text-dark">S/ ${h.precio.toFixed(2)}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        content.innerHTML = html;

        // 3. INICIALIZACIÓN DEL GRÁFICO (Chart.js con Tooltip mejorado)
        if(chartInstance) chartInstance.destroy();
        var ctx = document.getElementById('chartAnalisis').getContext('2d');
        var grad = ctx.createLinearGradient(0, 0, 0, 250);
        grad.addColorStop(0, 'rgba(19, 127, 236, 0.2)');
        grad.addColorStop(1, 'rgba(19, 127, 236, 0)');

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: historial.map(h => DateUtils.toUserDate(h.fecha).split('/')[0] + '/' + DateUtils.toUserDate(h.fecha).split('/')[1]),
                datasets: [{
                    label: 'Costo Unitario',
                    data: historial.map(h => h.precio),
                    borderColor: '#137fec',
                    backgroundColor: grad,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 6,
                    pointHoverRadius: 8,
                    pointBackgroundColor: '#fff',
                    pointBorderWidth: 3,
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#0f172a',
                        titleFont: { family: 'Montserrat', size: 13, weight: 'bold' },
                        bodyFont: { family: 'Poppins', size: 12 },
                        padding: 12,
                        cornerRadius: 10,
                        displayColors: false,
                        callbacks: {
                            // Cambiamos el texto del tooltip
                            label: function(context) {
                                return ' Precio: S/ ' + context.parsed.y.toFixed(2);
                            },
                            // AÑADIMOS EL PROVEEDOR AQUÍ
                            afterLabel: function(context) {
                                let item = historial[context.dataIndex];
                                return ' Proveedor: ' + item.prov;
                            }
                        }
                    }
                },
                scales: {
                    y: { 
                        grid: { borderDash: [5, 5], color: '#e2e8f0', drawBorder: false }, 
                        ticks: { 
                            font: { size: 11, family: 'Poppins' },
                            callback: value => 'S/ ' + value.toFixed(0)
                        } 
                    },
                    x: { 
                        grid: { display: false }, 
                        ticks: { font: { size: 11, family: 'Poppins' } } 
                    }
                }
            }
        });

    }).dbSelect('detalles_compra', 'precio_unitario, compras(codigo_orden, fecha_emision, proveedores(razon_social))', '&producto_id=eq.' + prodId + '&order=id.asc');
}

function cambiarEstadoSwitch(checkbox) {
    var inputHidden = document.getElementById('cart-estado');
    var lblBorrador = document.getElementById('lbl-borrador');
    var lblConfirmado = document.getElementById('lbl-confirmado');

    if (checkbox.checked) {
        // Estado: CONFIRMADO
        inputHidden.value = 'Confirmado';
        
        // Estilos visuales
        lblBorrador.classList.replace('text-on', 'text-off'); // Apagar borrador
        lblConfirmado.classList.replace('text-off', 'text-on'); // Encender confirmado
    } else {
        // Estado: BORRADOR
        inputHidden.value = 'Borrador';
        
        // Estilos visuales
        lblBorrador.classList.replace('text-off', 'text-on'); // Encender borrador (opcional, o dejar gris)
        lblConfirmado.classList.replace('text-on', 'text-off'); // Apagar confirmado
    }
}
