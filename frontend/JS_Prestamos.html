<script>
/**
 * MÓDULO: GESTIÓN DE PRÉSTAMOS (V2)
 */

var prestamosCache = [];
var prestamosGroup = {};
var carritoPrestamo = [];

// ==========================================
// 1. RENDERIZADO
// ==========================================
function renderPrestamos() {
    var container = document.getElementById('app-container');
    if (!container) return;

    // Loader Corporativo Pantalla Completa (Igual a Despachos)
    container.innerHTML = `
        <div class="loader-container animate__animated animate__fadeIn">
            <div class="stitch-spinner"></div>
            <h5 class="fw-bold mt-3 text-primary font-head">Control de Custodia</h5>
            <p class="small text-muted font-body">Sincronizando equipos y técnicos responsables...</p>
        </div>`;
    
    google.script.run.withSuccessHandler(html => {
        container.innerHTML = html;
        cargarDatosCustodia(); // Carga de datos real
    }).obtenerVista('View_Prestamos');
}
// ==========================================
// 2. LÓGICA DE DATOS
// ==========================================
function cargarDatosCustodia() {
    // 1. Loaders locales para no "limpiar" todo el módulo
    var metrics = document.getElementById('metrics-custodia');
    var grid = document.getElementById('grid-custodia-body');
    
    if(metrics) metrics.innerHTML = '<div class="col-12 text-center py-3"><div class="stitch-spinner mx-auto" style="width:30px; height:30px;"></div></div>';
    if(grid) grid.innerHTML = '<div class="col-12 text-center py-5"><div class="stitch-spinner mx-auto"></div></div>';

    var pData = new Promise(r => google.script.run.withSuccessHandler(res => r(res)).dbSelect('prestamos', '*, detalles_prestamo(*), usuarios!solicitante_id(nombre_completo)', '&estado=eq.PENDIENTE'));
    
    pData.then(res => {
        if(res.exito) {
            prestamosCache = res.datos || [];
            agruparPorTecnico();
            calcularKPIsCustodia(); 
            renderizarGridCustodia(); // Refresco de las tarjetas
        } else {
            MTPC_Toast.error("Error en base de datos: " + res.error);
        }
    });
}

function calcularKPIsCustodia() {
    var totalActivos = 0;
    var totalVencidos = 0;
    var totalProximos = 0;
    var hoy = new Date(); 
    hoy.setHours(0,0,0,0);

    // --- 1. LÓGICA DE CÁLCULO (SIN CAMBIOS) ---
    prestamosCache.forEach(p => {
        if(p.detalles_prestamo) {
            p.detalles_prestamo.forEach(det => {
                if(det.cantidad_pendiente > 0) {
                    totalActivos += det.cantidad_pendiente; 

                    if(p.fecha_retorno_estimada) {
                        var fRetorno = new Date(p.fecha_retorno_estimada + 'T00:00:00');
                        var diffTime = fRetorno - hoy;
                        var dias = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                        if(dias < 0) totalVencidos += det.cantidad_pendiente;
                        else if(dias >= 0 && dias <= 2) totalProximos += det.cantidad_pendiente;
                    }
                }
            });
        }
    });

    // IMPORTANTE: Asegúrate que el ID coincida con tu HTML ('metrics-custodia')
    var container = document.getElementById('metrics-custodia');
    if (!container) return;

    // --- 2. RENDERIZADO VISUAL (ESTÁNDAR ARMONIZADO) ---
    var html = '';

    // KPI 1: Azul
    html += `
        <div class="col-md-4 animate__animated animate__fadeInUp">
            <div class="card-kpi kpi-blue">
                <div class="kpi-icon-wrapper shadow-sm"><i class="fa-solid fa-boxes-stacked"></i></div>
                <div>
                    <div class="kpi-title">En Circulación</div>
                    <div class="kpi-value">${totalActivos}</div>
                    <div class="kpi-subtitle">Equipos prestados</div>
                </div>
            </div>
        </div>`;

    // KPI 2: Rojo
    html += `
        <div class="col-md-4 animate__animated animate__fadeInUp">
            <div class="card-kpi kpi-red">
                <div class="kpi-icon-wrapper shadow-sm"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div>
                    <div class="kpi-title">Alerta: Vencidos</div>
                    <div class="kpi-value">${totalVencidos}</div>
                    <div class="kpi-subtitle">Requieren retorno</div>
                </div>
            </div>
        </div>`;

    // KPI 3: Amarillo
    html += `
        <div class="col-md-4 animate__animated animate__fadeInUp">
            <div class="card-kpi kpi-yellow">
                <div class="kpi-icon-wrapper shadow-sm"><i class="fa-regular fa-clock"></i></div>
                <div>
                    <div class="kpi-title">Retorno Próximo</div>
                    <div class="kpi-value">${totalProximos}</div>
                    <div class="kpi-subtitle">Plazo menor a 48h</div>
                </div>
            </div>
        </div>`;

    container.innerHTML = html;
}

function agruparPorTecnico() {
    prestamosGroup = {};
    prestamosCache.forEach(p => {
        var nombre = p.usuarios ? p.usuarios.nombre_completo : 'Sin Asignar';
        if(!prestamosGroup[nombre]) prestamosGroup[nombre] = { nombre: nombre, usuario_id: p.solicitante_id, items: [], vencidos: 0 };

        if(p.detalles_prestamo && p.detalles_prestamo.length > 0) {
            p.detalles_prestamo.forEach(det => {
                if(det.cantidad_pendiente > 0) {
                    var hoy = new Date(); hoy.setHours(0,0,0,0);
                    var fRetorno = p.fecha_retorno_estimada ? new Date(p.fecha_retorno_estimada+'T00:00:00') : null;
                    var estado = 'ok'; var diasDiff = 0;
                    if(fRetorno) {
                        var diffTime = fRetorno - hoy;
                        diasDiff = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        if(diasDiff < 0) { estado = 'vencido'; prestamosGroup[nombre].vencidos++; }
                        else if(diasDiff <= 1) estado = 'proximo';
                    }
                    prestamosGroup[nombre].items.push({ id_detalle: det.id, id_prestamo: p.id, descripcion: det.descripcion, serie: det.numero_serie, cantidad: det.cantidad_pendiente, fecha_estimada: p.fecha_retorno_estimada, motivo: p.motivo, codigo_prestamo: p.codigo_prestamo, dias: diasDiff, estado: estado });
                }
            });
        }
    });
}

function renderizarGridCustodia(filtroEstado = 'TODOS') {
    var grid = document.getElementById('grid-custodia-body');
    if (!grid) return;
    grid.innerHTML = '';
    
    var nombres = Object.keys(prestamosGroup);

    if(nombres.length === 0) {
        grid.innerHTML = `
            <div class="col-12 text-center py-5 opacity-50 animate__animated animate__fadeIn">
                <i class="fa-solid fa-check-circle fs-1 text-success mb-3"></i>
                <h5 class="fw-bold font-head text-dark">Todo en orden</h5>
                <p class="font-body small">No hay activos pendientes de devolución en Mi Técnico PC.</p>
            </div>`;
        return;
    }

    nombres.forEach(nombre => {
        var data = prestamosGroup[nombre];
        var itemsShow = data.items;
        
        // 1. FILTRADO
        if(filtroEstado === 'VENCIDO') itemsShow = data.items.filter(i => i.estado === 'vencido');
        else if(filtroEstado === 'HOY') itemsShow = data.items.filter(i => i.dias === 0);

        if(itemsShow.length === 0 && filtroEstado !== 'TODOS') return;

        // 2. PRIORIZACIÓN (Vencidos arriba siempre)
        itemsShow.sort((a, b) => {
            const prioridades = { 'vencido': 1, 'proximo': 2, 'normal': 3 };
            return (prioridades[a.estado] || 3) - (prioridades[b.estado] || 3);
        });

        // 3. SEMÁFORO DE CABECERA
        var trustBadge = data.vencidos > 0 
            ? `<span class="badge bg-danger bg-opacity-10 text-danger border border-danger-subtle px-2 py-1" style="font-size:0.6rem">
                <i class="fa-solid fa-triangle-exclamation me-1"></i>${data.vencidos} Vencido${data.vencidos > 1 ? 's' : ''}
               </span>`
            : `<span class="badge bg-success bg-opacity-10 text-success border border-success-subtle px-2 py-1" style="font-size:0.6rem">
                <i class="fa-solid fa-shield-check me-1"></i>Al día
               </span>`;

        // Determinar color de la franja (Stripe)
        let stripeClass = 'bg-primary';
        let stripeAnim = '';
        if(data.vencidos > 0) { 
            stripeClass = 'bg-danger'; 
            stripeAnim = 'animate__animated animate__pulse animate__infinite'; 
        } else if (itemsShow.some(i => i.estado === 'proximo')) { 
            stripeClass = 'bg-warning'; 
        }

        // 4. RENDERIZADO DE ITEMS (Estilo SaaS Slim)
        var listaItemsHtml = itemsShow.map(item => {
            let rowStyle = ''; let dateBadge = ''; let statusIcon = '';

            if(item.estado === 'vencido') {
                rowStyle = 'background-color: #fff5f5; border-left: 3px solid #ef4444;'; 
                dateBadge = `<span class="text-danger fw-bold" style="font-size:0.6rem">Retraso: ${Math.abs(item.dias)}d</span>`;
                statusIcon = `<i class="fa-solid fa-circle-exclamation text-danger fs-6"></i>`;
            } else if (item.estado === 'proximo' || item.dias === 0) {
                rowStyle = 'background-color: #fffbeb; border-left: 3px solid #f59e0b;';
                dateBadge = `<span class="text-warning fw-bold" style="font-size:0.6rem">Vence hoy</span>`;
            } else {
                rowStyle = 'background-color: #f8fafc; border-left: 3px solid #cbd5e1;';
                dateBadge = `<span class="text-muted" style="font-size:0.6rem">${item.dias}d restantes</span>`;
            }

            return `
                <div class="d-flex align-items-center justify-content-between p-2 mb-2 rounded-end shadow-sm" style="${rowStyle} min-height: 55px;">
                    <div class="d-flex align-items-center gap-2 overflow-hidden">
                        <input class="form-check-input mt-0 border-secondary flex-shrink-0 item-check-retorno" 
                               type="checkbox" value="${item.id_detalle}" 
                               data-prestamo="${item.id_prestamo}" 
                               onchange="validarSeleccionTarjeta(this)"
                               style="cursor:pointer; width:16px; height:16px;">
                        
                        <div class="overflow-hidden">
                            <div class="d-flex align-items-center gap-2">
                                <span class="fw-bold text-dark font-head text-truncate" style="font-size: 0.72rem;" title="${item.descripcion}">${item.descripcion}</span>
                                ${statusIcon}
                            </div>
                            <div class="d-flex gap-2 align-items-center mt-1">
                                <span class="text-muted" style="font-size:0.6rem"><i class="fa-solid fa-barcode me-1"></i>${item.serie || 'S/N'}</span>
                                ${dateBadge}
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-link text-secondary p-0 ms-1 flex-shrink-0" onclick="verDetallePrestamo(${item.id_prestamo})">
                        <i class="fa-regular fa-eye" style="font-size:0.8rem"></i>
                    </button>
                </div>`;
        }).join('');

        // 5. ENSAMBLAJE FINAL DE LA TARJETA
        var cardHtml = `
            <div class="col-12 col-md-6 col-xl-4 col-xxl-3 animate__animated animate__fadeIn">
                <div class="tech-card shadow-sm h-100 d-flex flex-column" style="border-radius: 16px; overflow: hidden; background: #fff; border: 1px solid #e2e8f0;">
                    <div class="tech-card-stripe ${stripeClass} ${stripeAnim}" style="height: 5px;"></div>
                    
                    <div class="p-4 flex-grow-1">
                        <div class="d-flex align-items-start justify-content-between mb-4">
                            <div class="d-flex align-items-center gap-2 overflow-hidden">
                                <div class="rounded-circle bg-primary bg-opacity-10 border border-primary border-opacity-10 d-flex align-items-center justify-content-center fw-bold text-primary font-head" style="width:42px; height:42px; flex-shrink:0; font-size: 1.1rem;">
                                    ${nombre.charAt(0)}
                                </div>
                                <div class="overflow-hidden">
                                    <h6 class="m-0 fw-bold font-head text-dark text-truncate" style="font-size:0.85rem">${nombre}</h6>
                                    <small class="text-muted font-body" style="font-size:0.65rem">${data.items.length} activos asignados</small>
                                </div>
                            </div>
                            ${trustBadge}
                        </div>

                        <div class="custom-scrollbar" style="max-height: 205px; overflow-y: auto; padding-right: 4px;">
                            ${listaItemsHtml}
                        </div>
                    </div>

                    <div class="p-3 border-top bg-light bg-opacity-25 mt-auto">
                        <button class="btn-std btn-std-primary w-100 py-2 btn-recibir-masivo" 
                                style="font-size:0.75rem; background-color: #135bec; border:none; transition: all 0.3s;" 
                                onclick="devolverSeleccionados(this)"
                                disabled>
                            <i class="fa-solid fa-rotate-left me-2"></i> Recibir Seleccionados
                        </button>
                    </div>
                </div>
            </div>`;
        grid.innerHTML += cardHtml;
    });
}
/**
 * Habilita o deshabilita el botón de retorno según los checkboxes marcados en la tarjeta.
 */
function validarSeleccionTarjeta(checkbox) {
    // 1. Buscamos la tarjeta (tech-card) que contiene al checkbox
    const tarjeta = checkbox.closest('.tech-card');
    if (!tarjeta) return;

    // 2. Buscamos el botón de esa tarjeta específica
    const boton = tarjeta.querySelector('.btn-recibir-masivo');
    
    // 3. Contamos cuántos checkboxes están marcados en ESTA tarjeta
    const seleccionados = tarjeta.querySelectorAll('.item-check-retorno:checked').length;

    // 4. Activamos el botón solo si hay al menos uno marcado
    boton.disabled = (seleccionados === 0);
}

function aplicarFiltroCustodia(filtro, elemento) {
    // 1. Buscamos el contenedor padre
    const wrapper = elemento.closest('.trends-filter-wrapper');
    
    // 2. Quitamos el azul (active) de todos los hermanos
    wrapper.querySelectorAll('.btn-segment').forEach(btn => btn.classList.remove('active'));

    // 3. Pintamos de azul el botón actual
    elemento.classList.add('active');

    // 4. Ejecutamos tu lógica de renderizado
    renderizarGridCustodia(filtro);
}

function filtrarCustodiaTexto() {
    var texto = document.getElementById('buscador-custodia').value.toLowerCase();
    var tarjetas = document.querySelectorAll('#grid-custodia .col-md-6');
    tarjetas.forEach(t => { 
        var nombre = t.querySelector('h6').innerText.toLowerCase(); 
        if(nombre.includes(texto)) t.style.display = 'block'; else t.style.display = 'none'; 
    });
}

// 3. NUEVO PRÉSTAMO
// ==========================================

                    <div class="card-std p-4 bg-white mb-4 border-0 shadow-sm" style="border-radius: 12px;">

                        <div class="mb-4">

function agregarAlCarritoPrestamo(idProd) {
    if(!idProd) return;
    var sel = document.getElementById('pst-prod-select');
    var text = sel.options[sel.selectedIndex].text;
    var nombreClean = text.split(' (Stock')[0];
    carritoPrestamo.push({ id: idProd, nombre: nombreClean, cantidad: 1, serie: '' });
    sel.value = ""; 
    renderCarritoPrestamo();
}

function renderCarritoPrestamo() {
    var container = document.getElementById('pst-lista-items');
    
    if(carritoPrestamo.length === 0) { 
        container.innerHTML = `
            <div class="text-center py-5 text-muted x-small font-body border border-dashed rounded-4 bg-light opacity-75">
                <i class="fa-solid fa-cart-flatbed-suitcases mb-3 d-block fa-3x opacity-25"></i>
                No hay equipos seleccionados aún
            </div>`; 
        return; 
    }

    container.innerHTML = carritoPrestamo.map((item, idx) => {
        // APLICAMOS EL LÍMITE DE 16 CARACTERES
        const nombreCorto = item.nombre.length > 16 
            ? item.nombre.substring(0, 16) + "..." 
            : item.nombre;

        return `
        <div class="d-flex align-items-center p-3 bg-white border rounded-4 shadow-sm animate__animated animate__fadeIn mb-3" style="min-height: 85px;">
            
            <div class="flex-shrink-0 bg-primary bg-opacity-10 rounded-3 d-flex align-items-center justify-content-center me-3" style="width: 42px; height: 42px;">
                <i class="fa-solid fa-box-open text-primary" style="font-size: 1rem;"></i>
            </div>

            <div class="flex-grow-1 min-w-0 pe-2">
                <div class="fw-bold text-dark font-head mb-1" 
                     style="font-size: 0.8rem; line-height: 1.2;" 
                     title="${item.nombre}"> ${nombreCorto}
                </div>
                <div class="input-std-wrapper" style="max-width: 160px;">
                    <i class="fa-solid fa-barcode input-std-icon text-muted" style="font-size: 0.65rem; left: 0.6rem;"></i>
                    <input type="text" 
                           class="input-std font-monospace" 
                           placeholder="S/N o ID..." 
                           value="${item.serie}" 
                           oninput="carritoPrestamo[${idx}].serie = this.value" 
                           style="font-size: 0.65rem; padding: 0.35rem 0.5rem 0.35rem 1.7rem; border-radius: 6px; background-color: #f8fafc; height: 28px;">
                </div>
            </div>

            <div class="flex-shrink-0 d-flex align-items-center gap-3 ps-3 border-start" style="width: 110px; justify-content: flex-end;">
                <div class="text-center">
                    <span class="d-block text-muted font-head fw-bold mb-1" style="font-size: 0.5rem; letter-spacing: 0.5px;">CANT.</span>
                    <input type="number" 
                           class="input-std text-center font-body p-0 fw-bold shadow-none" 
                           value="${item.cantidad}" 
                           min="1"
                           onchange="carritoPrestamo[${idx}].cantidad = parseInt(this.value) || 1"
                           style="width: 40px; height: 30px; border-radius: 6px; font-size: 0.8rem;">
                </div>
                
                <button class="btn-std btn-icon-only text-danger border-0 bg-transparent hover-bg-danger-subtle" 
                        onclick="carritoPrestamo.splice(${idx}, 1); renderCarritoPrestamo()" 
                        style="width: 32px; height: 32px; border-radius: 8px;">
                    <i class="fa-solid fa-trash-can" style="font-size: 0.9rem;"></i>
                </button>
            </div>
        </div>`;
    }).join('');
}

function guardarPrestamo() {
    // 1. Recolección de datos
    var user = document.getElementById('pst-user').value; 
    var motivo = document.getElementById('pst-motivo').value; 
    var salida = document.getElementById('pst-fecha').value; 
    var retorno = document.getElementById('pst-retorno').value;
    
    // 2. Validaciones con el nuevo estándar de Toast
    if(!user || user === "0") return MTPC_Toast.error("Selecciona un técnico responsable");
    if(carritoPrestamo.length === 0) return MTPC_Toast.error("El carrito está vacío");
    
    var payload = { 
        cabecera: { 
            solicitante_id: user, 
            motivo: motivo, 
            fecha_salida: salida, 
            fecha_retorno_estimada: retorno, 
            estado: 'PENDIENTE', 
            codigo_prestamo: 'PST-' + Date.now().toString().slice(-6) 
        }, 
        items: carritoPrestamo.map(i => ({ 
            producto_id: i.id, 
            nombre: i.nombre, 
            cantidad: i.cantidad, 
            numero_serie: i.serie 
        })) 
    };

    // 3. Feedback inicial de carga
    MTPC_Toast.loading("Registrando custodia de activos...");
    
    google.script.run.withSuccessHandler(res => {
        if(res.exito) { 
            // Ocultamos el loader antes de mostrar el éxito
            MTPC_Toast.hideLoading();
            MTPC_Toast.success("Préstamo registrado"); 

            // 4. LIMPIEZA DE MEMORIA (Soluciona problemas de duplicados)
            carritoPrestamo = []; 

            // 5. CIERRE DEL PANEL LATERAL
            var offcanvas = document.getElementById('offcanvasPrestamo'); 
            var instance = bootstrap.Offcanvas.getInstance(offcanvas); 
            if(instance) instance.hide(); 

            // 6. REFRESCO DINÁMICO (Llamamos a la carga interna local)
            cargarDatosCustodia(); 

            // 7. DIÁLOGO DE ÉXITO PREMIUM (Estilo Despachos)
            Swal.fire({
                title: '¡Custodia Iniciada!',
                html: `<div class="py-2 text-muted">El ticket <b class="text-primary">${payload.cabecera.codigo_prestamo}</b> se generó con éxito.</div>
                       <p class="small">Los equipos ahora figuran bajo responsabilidad del técnico.</p>`,
                icon: 'success',
                iconColor: '#22c55e',
                confirmButtonText: 'Entendido',
                buttonsStyling: false,
                customClass: {
                    popup: 'mtpc-swal-popup',
                    title: 'mtpc-swal-title',
                    htmlContainer: 'mtpc-swal-html',
                    confirmButton: 'btn btn-primary mtpc-swal-confirm px-5'
                }
            });

        } else { 
            MTPC_Toast.error("Error: " + res.error); 
        }
    }).guardarPrestamoBackend(payload);
}

// ==========================================
// 4. DEVOLUCIÓN Y DETALLES
// ==========================================
function devolverSeleccionados(btn) {
    // 1. Localización del contexto (Tarjeta del técnico)
    var card = btn.closest('.tech-card'); 
    if(!card) return console.error("No se encontró el contenedor .tech-card");

    // 2. Selección de items marcados
    var checks = card.querySelectorAll('.item-check-retorno:checked');
    
    if(checks.length === 0) {
        return MTPC_Toast.error("Selecciona al menos un ítem para recibir.");
    }
    
    var itemsADevolver = []; 
    checks.forEach(c => { 
        itemsADevolver.push({ 
            id_detalle: c.value, 
            id_prestamo: c.getAttribute('data-prestamo') 
        }); 
    });

    // 3. Uso del nuevo componente MTPC_Dialog para confirmación
    MTPC_Dialog.confirm(
        `¿Recibir ${itemsADevolver.length} activos?`, 
        "Se procesará el retorno y los equipos volverán a figurar como <b>Stock Disponible</b> en el taller.", 
        "Sí, Recibir",
        "#135bec" // Azul corporativo de Mi Técnico PC
    ).then(r => {
        if(r.isConfirmed) { 
            // 4. Feedback de procesamiento nativo
            MTPC_Toast.loading("Actualizando inventario..."); 
            
            google.script.run
                .withSuccessHandler(res => { 
                    MTPC_Toast.hideLoading(); // Cerramos el loader

                    if(res.exito) { 
                        MTPC_Toast.success("Devolución procesada correctamente"); 
                        
                        // 5. REFRESCO DINÁMICO: 
                        // Esto repinta la grid y actualiza los KPIs superiores
                        cargarDatosCustodia(); 
                    } else { 
                        MTPC_Toast.error("Error al procesar: " + res.error); 
                    } 
                })
                .procesarDevolucionMasiva(itemsADevolver); 
        }
    });
}

function verDetallePrestamo(idPrestamo) {

            <div class="stitch-spinner mx-auto"></div>
            <p class="text-muted small mt-3 font-body">Consultando base de datos...</p>
        </div>`;

    var pData = new Promise(r => google.script.run.withSuccessHandler(res => r(res)).dbSelect('prestamos', '*, usuarios!solicitante_id(nombre_completo), detalles_prestamo(*)', '&id=eq.' + idPrestamo));
    
    pData.then(res => {
        if(!res.exito || res.datos.length === 0) { 
            container.innerHTML = '<div class="p-5 text-center text-danger font-body"><i class="fa-solid fa-circle-xmark fa-2x mb-3"></i><p>Error: No se encontró el registro.</p></div>'; 
            return;

        var p = res.datos[0];
        var nombre = p.usuarios ? p.usuarios.nombre_completo : 'Sin Asignar';

            ? '<span class="badge-std badge-warning shadow-sm"><i class="fa-solid fa-clock me-1"></i>Vigente</span>' 
            : '<span class="badge-std badge-success shadow-sm"><i class="fa-solid fa-check-double me-1"></i>Finalizado</span>';
        
        var fSalida = formatearFechaDDMMYYYY(p.fecha_salida);
        var fLimite = formatearFechaDDMMYYYY(p.fecha_retorno_estimada);

        // Renderizado de Items (Diseño Slim con más aire)
        var itemsHtml = p.detalles_prestamo.map(d => {
            var st = d.cantidad_pendiente > 0 
                ? '<span class="text-danger fw-bold" style="font-size:0.6rem">EN CUSTODIA</span>' 
                : '<span class="text-success fw-bold" style="font-size:0.6rem">DEVUELTO</span>';
            
            return `
                <div class="d-flex align-items-center justify-content-between p-3 bg-white border rounded-3 mb-2 shadow-sm">
                    <div class="d-flex align-items-center gap-3 overflow-hidden pe-2">
                        <div class="bg-primary bg-opacity-10 rounded-3 d-flex align-items-center justify-content-center" style="width:38px; height:38px; flex-shrink:0;">
                            <i class="fa-solid fa-microchip text-primary" style="font-size:0.85rem"></i>
                        </div>
                        <div class="overflow-hidden">
                            <div class="fw-bold text-dark font-head text-truncate" style="font-size:0.75rem" title="${d.descripcion}">${d.descripcion}</div>
                            <div class="text-muted x-small"><i class="fa-solid fa-barcode me-1"></i>${d.numero_serie || 'S/N'}</div>
                        </div>
                    </div>
                    <div class="text-end flex-shrink-0">${st}</div>
                </div>`;
        }).join('');

        var html = `
            <div class="d-flex flex-column h-100">
                <div class="flex-grow-1 overflow-auto px-4 py-4">
                    <div class="animate__animated animate__fadeIn">
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h6 class="text-muted text-uppercase fw-bold mb-1" style="font-size:0.65rem; letter-spacing:1px;">Ticket ID</h6>
                                <span class="fw-bold text-primary fs-5 font-head">${p.codigo_prestamo}</span>
                            </div>
                            <div class="text-end">
                                <h6 class="text-muted text-uppercase fw-bold mb-1" style="font-size:0.65rem; letter-spacing:1px;">Estatus</h6>
                                ${estadoBadge}
                            </div>
                        </div>

                        <div class="card-std p-4 bg-white mb-4 border-start border-4 border-primary shadow-sm" style="border-radius: 12px;">
                            <h6 class="fw-bold text-muted font-head mb-3 text-uppercase" style="font-size:0.65rem; letter-spacing:0.5px;">Responsable de Entrega</h6>
                            <div class="d-flex align-items-center gap-3">
                                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold shadow-sm" 
                                     style="width:40px; height:40px; font-size:1rem; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);">
                                    ${nombre.charAt(0)}
                                </div>
                                <p class="m-0 font-body fw-bold text-dark fs-6">${nombre}</p>
                            </div>
                        </div>

                        <div class="mb-4 px-1">
                            <h6 class="fw-bold text-muted font-head mb-2 text-uppercase" style="font-size:0.65rem; letter-spacing:0.5px;">
                                <i class="fa-solid fa-quote-left me-2"></i>Notas del Préstamo
                            </h6>
                            <div class="p-3 bg-white border rounded-3 text-muted small fst-italic shadow-sm" style="background-color: #fbfcfd !important;">
                                "${p.motivo || 'No se registraron observaciones adicionales para este préstamo.'}"
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <div class="bg-white border rounded-3 p-3 text-center shadow-sm">

                            </div>
                            <div class="col-6">
                                <div class="bg-warning bg-opacity-10 border border-warning-subtle rounded-3 p-3 text-center shadow-sm">
                                    <span class="d-block text-muted text-uppercase mb-1" style="font-size:0.6rem; letter-spacing:0.5px;">Vencimiento</span>
                                    <span class="fw-bold text-dark font-body" style="font-size:0.85rem">${fLimite}</span>
                                </div>
                            </div>
                        </div>

                        <h6 class="fw-bold text-muted font-head mb-3 text-uppercase px-1" style="font-size:0.65rem; letter-spacing:0.5px;">

                    <button class="btn-std btn-std-outline w-100 py-3 fw-bold" onclick="imprimirTicketPrestamo('${p.codigo_prestamo}')" style="border-radius: 10px;">

                    </button>
                    <p class="text-center text-muted x-small mt-3 mb-0 font-body">
                        <i class="fa-solid fa-shield-halved me-1"></i> Documento de trazabilidad de Mi Técnico PC
                    </p>
                </div>
            </div>`;
        container.innerHTML = html;
    });
}

function abrirHistorialPrestamos() {
    var bsOffcanvas = new bootstrap.Offcanvas(document.getElementById('offcanvasHistorial'));
    bsOffcanvas.show();
    var container = document.getElementById('historial-body');
    
    container.innerHTML = '<div class="text-center py-5"><div class="stitch-spinner mx-auto"></div></div>';

    var d = new Date(); d.setDate(d.getDate() - 30);
    var fechaCorte = d.toISOString().split('T')[0];
    var hoy = new Date().toISOString().split('T')[0];

    var pData = new Promise(r => google.script.run.withSuccessHandler(res => r(res)).dbSelect('prestamos', '*, usuarios!solicitante_id(nombre_completo), detalles_prestamo(descripcion, numero_serie)', `&fecha_salida=gte.${fechaCorte}&order=id.desc`));

    pData.then(res => {
        if(!res.exito || res.datos.length === 0) { 
            container.innerHTML = '<div class="p-5 text-center opacity-50 font-body">No se registraron movimientos recientes.</div>';
            return; 
        }

        const vencidos = res.datos.filter(p => p.estado === 'PENDIENTE' && p.fecha_retorno_estimada < hoy);

        let html = '<div class="p-4 bg-body">';

        // BANNER DE ALERTA: Término medio
        if (vencidos.length > 0) {
            html += `
                <div class="d-flex gap-3 p-3 mb-4 rounded-3 border animate__animated animate__fadeIn" 
                     style="background-color: #fff1f2; border-color: #fecaca;">
                    <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" 
                         style="width: 36px; height: 36px; background: #fee2e2; color: #ef4444;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:0.9rem"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold text-danger mb-1 font-head" style="font-size:0.85rem">Gestión de Retrasos</h6>
                        <p class="text-danger opacity-75 mb-2 font-body" style="font-size:0.75rem; line-height:1.3;">
                            Detectamos <strong>${vencidos.length} equipos con fecha vencida</strong>. Es necesario coordinar el retorno al taller.
                        </p>
                        <button class="btn btn-sm bg-white text-danger border border-danger-subtle rounded-3 fw-bold font-head px-3" 
                                style="font-size:0.65rem" onclick="notificarVencidos()">
                            Notificar Responsables
                        </button>
                    </div>
                </div>`;
        }

        html += `
            <div class="position-relative ps-1">
                <div class="position-absolute" style="left: 17px; top: 10px; bottom: 0; width: 2px; background-color: #e2e8f0; z-index:0;"></div>
        `;

        res.datos.forEach(p => {
            const esVencido = p.estado === 'PENDIENTE' && p.fecha_retorno_estimada < hoy;
            const esFinalizado = p.estado === 'FINALIZADO';
            const producto = p.detalles_prestamo?.[0]?.descripcion || 'Equipo General';
            const serie = p.detalles_prestamo?.[0]?.numero_serie || 'S/N';
            const tecnico = p.usuarios?.nombre_completo || 'Sin técnico';

            let config = { icon: 'fa-clock', color: '#135bec', bg: '#eef4ff', label: 'ACTIVO' };
            if (esVencido) config = { icon: 'fa-hourglass-end', color: '#ef4444', bg: '#fee2e2', label: 'VENCIDO' };
            if (esFinalizado) config = { icon: 'fa-check-double', color: '#10b981', bg: '#dcfce7', label: 'CERRADO' };

            html += `
                <div class="position-relative d-flex gap-4 mb-4" onclick="verDetallePrestamo(${p.id})" style="cursor:pointer">
                    <div class="position-relative z-1">
                        <div class="rounded-circle border border-white border-4 shadow-sm d-flex align-items-center justify-content-center" 
                             style="width: 36px; height: 36px; background-color: ${config.bg}; color: ${config.color};">
                            <i class="fa-solid ${config.icon}" style="font-size: 0.75rem;"></i>
                        </div>
                    </div>

                    <div class="flex-grow-1 p-3 bg-white rounded-3 border shadow-sm" 
                         style="border-left: 4px solid ${config.color} !important; transition: transform 0.2s;">
                        
                        <div class="d-flex justify-content-between align-items-start mb-1">
                            <h6 class="fw-bold text-dark font-head m-0" style="font-size: 0.85rem;">${producto}</h6>
                            <span class="badge rounded-pill font-head" 
                                  style="font-size: 0.55rem; background: ${config.bg}; color: ${config.color}; letter-spacing: 0.5px;">
                                ${config.label}
                            </span>
                        </div>

                        <p class="text-muted x-small mb-3">
                            ${formatearFechaDDMMYYYY(p.fecha_salida)} • S/N: ${serie}
                        </p>

                        <div class="d-flex align-items-center gap-2 pt-2 border-top" style="border-color: #f1f5f9 !important;">
                            <div class="rounded-circle bg-dark bg-opacity-10 d-flex align-items-center justify-content-center text-dark fw-bold font-head" 
                                 style="width: 24px; height: 24px; font-size: 0.65rem;">
                                ${tecnico.charAt(0)}
                            </div>
                            <span class="text-muted font-body" style="font-size: 0.7rem;">
                                Responsable: <span class="fw-bold text-dark">${tecnico}</span>
                            </span>
                        </div>
                    </div>
                </div>`;
        });

        html += '</div></div>';
        container.innerHTML = html;
    });
}
